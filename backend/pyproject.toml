[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
pythonpath = ["."]
env = [
    "DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/logdb",
    "TEST_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5433/logdb_test",
]
